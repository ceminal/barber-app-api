version: '3.8'

services:
  app:
    build: .
    container_name: barber_express_api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGO_URI=mongodb://db:27017/barber_db
      - JWT_SECRET=supersecretkey
    depends_on:
      - db
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev
    restart: unless-stopped

  db:
    image: mongo:latest
    container_name: barber_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  mongo-express:
    image: mongo-express
    container_name: barber_mongo_ui
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://db:27017/
    depends_on:
      - db
    restart: unless-stopped

volumes:
  mongo-data:
