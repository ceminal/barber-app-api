services:
  app:
    build: .
    container_name: barber_express_api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db

    command: npm start 
    restart: unless-stopped

  db:
    image: mongo:latest
    container_name: barber_mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  mongo-express:
    image: mongo-express
    container_name: barber_mongo_ui
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_USER}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_PASS}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_USER}:${MONGO_PASS}@db:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=${ME_BASIC_USER}
      - ME_CONFIG_BASICAUTH_PASSWORD=${ME_BASIC_PASS} 
    depends_on:
      - db
    restart: unless-stopped

volumes:
  mongo-data: